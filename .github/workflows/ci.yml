name: CI — Lint, Typecheck & Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Quality gates (lint + format + types) ────────────────────────────────
  quality:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate migrations
        run: npm run migrations:validate

      - name: Check for empty test files
        run: npm run check:empty-tests

      - name: Lint
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

  # ─── Migration rollback testing ───────────────────────────────────────────
  migration-rollback:
    name: Migration Rollback Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run migration rollback tests
        run: npm run test:migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

  # ─── Unit + Integration tests ─────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Security audit (dependency vulnerabilities) ──────────────────────────
  security:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm run audit:high

  # ─── Storybook build validation ───────────────────────────────────────────
  storybook:
    name: Storybook — Build & Validate
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Storybook
        run: npm run storybook:ci

      - name: Verify story files exist
        run: |
          if [ ! -f ".storybook/storybook.requires.js" ]; then
            echo "Error: Storybook requires file not generated"
            exit 1
          fi
          echo "✓ Storybook build successful"

  # ─── Seed validation ──────────────────────────────────────────────────────
  seed-validation:
    name: Seed — Migration & Data Validation
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cocohub_seed_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cocohub_seed_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Apply migrations
        run: npm run migrate

      - name: Run seed (first pass)
        run: npm run seed:test

      - name: Run seed (second pass — idempotency check)
        run: npm run seed:test

      - name: Run seed data tests
        run: npm test -- --testPathPattern="backend/seeds/__tests__/seedData.test.ts" --verbose
