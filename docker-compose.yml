services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cocohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cocohub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cocohub_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cocohub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:18-alpine
    restart: unless-stopped
    working_dir: /app
    env_file: .env.docker
    environment:
      NODE_ENV: development
      APP_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-cocohub}:${POSTGRES_PASSWORD:-cocohub_dev}@postgres:5432/${POSTGRES_DB:-cocohub_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx tsx backend/server/index.ts"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cocohub.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
