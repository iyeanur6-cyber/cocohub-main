<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetChain Admin</title>
    <style>
      :root {
        --bg: #08111d;
        --panel: #101a2e;
        --line: rgba(177, 196, 230, 0.16);
        --text: #edf4ff;
        --muted: #95a6c6;
        --accent: #4ea0ff;
        --good: #67e8a7;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(78, 160, 255, 0.22), transparent 32%),
          radial-gradient(circle at bottom right, rgba(103, 232, 167, 0.12), transparent 28%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .card {
        width: min(760px, calc(100vw - 32px));
        background: linear-gradient(180deg, rgba(16, 26, 46, 0.96), rgba(10, 16, 30, 0.96));
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 5vw, 3.2rem); }
      p { color: var(--muted); line-height: 1.65; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
      a {
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.03);
        font-weight: 650;
      }
      .primary { background: linear-gradient(135deg, #4ea0ff, #2f7fff); border-color: transparent; }
      .good { background: linear-gradient(135deg, #67e8a7, #27c07b); color: #05130c; border-color: transparent; }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="color: var(--good); font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.8rem;">PetChain Admin</div>
      <h1>Dashboard, analytics, API keys, and support.</h1>
      <p>
        Use the dashboard to monitor app health, review analytics, manage users, export CSVs, and
        process support requests. Use MFA-enabled admin credentials to unlock all tools.
      </p>
      <div class="actions">
        <a class="primary" href="/admin/dashboard.html">Open dashboard</a>
        <a class="good" href="/admin/api-keys.html">Manage API keys</a>
      </div>
    </div>
  </body>
</html>
